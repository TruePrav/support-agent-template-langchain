<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NovaTech Gaming</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero {
      text-align: center;
      padding: 40px 20px;
    }
    .hero h1 { font-size: 3rem; font-weight: 700; margin-bottom: 12px; }
    .hero h1 span { color: #7c3aed; }
    .hero p { font-size: 1.2rem; color: #888; }

    /* Chat bubble button */
    #chat-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 60px;
      height: 60px;
      background: #7c3aed;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,58,237,0.5);
      transition: transform 0.2s;
      z-index: 1000;
    }
    #chat-bubble:hover { transform: scale(1.08); }
    #chat-bubble svg { width: 28px; height: 28px; fill: white; }

    /* Chat window */
    #chat-window {
      position: fixed;
      bottom: 100px;
      right: 28px;
      width: 360px;
      height: 500px;
      background: #1a1a1a;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
      border: 1px solid #2a2a2a;
    }
    #chat-window.open { display: flex; }

    .chat-header {
      background: #7c3aed;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .avatar {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .chat-header .info h3 { font-size: 0.95rem; font-weight: 600; }
    .chat-header .info p { font-size: 0.75rem; opacity: 0.8; }
    .chat-header .close {
      margin-left: auto;
      cursor: pointer;
      opacity: 0.8;
      font-size: 20px;
      line-height: 1;
    }
    .chat-header .close:hover { opacity: 1; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.875rem;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.bot {
      background: #2a2a2a;
      color: #e5e5e5;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
    }
    .msg.user {
      background: #7c3aed;
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 16px;
      background: #2a2a2a;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      width: fit-content;
    }
    .typing span {
      width: 7px;
      height: 7px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #2a2a2a;
      background: #1a1a1a;
    }
    .chat-input input {
      flex: 1;
      background: #2a2a2a;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      color: #fff;
      font-size: 0.875rem;
      outline: none;
    }
    .chat-input input::placeholder { color: #555; }
    .chat-input button {
      width: 40px;
      height: 40px;
      background: #7c3aed;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .chat-input button:hover { background: #6d28d9; }
    .chat-input button svg { width: 18px; height: 18px; fill: white; }
  </style>
</head>
<body>

  <div class="hero">
    <h1>NovaTech <span>Gaming</span></h1>
    <p>Your one-stop shop for gaming gear, consoles & digital gift cards</p>
  </div>

  <!-- Chat bubble -->
  <div id="chat-bubble" onclick="toggleChat()">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  </div>

  <!-- Chat window -->
  <div id="chat-window">
    <div class="chat-header">
      <div class="avatar">🎮</div>
      <div class="info">
        <h3>NovaTech Support</h3>
        <p>Typically replies instantly</p>
      </div>
      <div class="close" onclick="toggleChat()">✕</div>
    </div>
    <div class="chat-messages" id="messages">
      <div class="msg bot">Hey! Welcome to NovaTech Gaming 👋 How can I help you today?</div>
    </div>
    <div class="chat-input">
      <input type="text" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    // Generate or retrieve a persistent session ID for this browser
    let sessionId = localStorage.getItem('novatech_session');
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      localStorage.setItem('novatech_session', sessionId);
    }

    function toggleChat() {
      const win = document.getElementById('chat-window');
      win.classList.toggle('open');
      if (win.classList.contains('open')) {
        document.getElementById('msg-input').focus();
      }
    }

    function addMessage(text, type) {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showTyping() {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing-indicator';
      div.innerHTML = '<span></span><span></span><span></span>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      addMessage(text, 'user');
      showTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId })
        });
        const data = await res.json();
        hideTyping();
        addMessage(data.reply, 'bot');
      } catch (err) {
        hideTyping();
        addMessage('Connection error. Please try again.', 'bot');
      }
    }
  </script>
</body>
</html>
